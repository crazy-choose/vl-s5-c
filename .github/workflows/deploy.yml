name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker:
          - s5-worker-1
          - s5-worker-2
          - s5-worker-3
          - s5-worker-4
          - s5-worker-5
          - s5-worker-6
          - s5-worker-7
          - s5-worker-8
          - s5-worker-9
          - s5-worker-10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Deploy
        run: npx wrangler deploy --name ${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
